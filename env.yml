name: egon-jao-matching-env
channels:
  - conda-forge
  - defaults
dependencies:
  - python >= 3.9, <= 3.11
  - pip
  - black
  - conda-forge::pre_commit
  - conda-forge::isort
  - conda-forge::geopandas
  - conda-forge::pypsa = 0.26.2
  - conda-forge::shapely
  - conda-forge::numpy < 2.0
  - conda-forge::pandas
  - conda-forge::scikit-learn
  - conda-forge::matplotlib
  - conda-forge::cartopy
  - conda-forge::folium
  - conda-forge::dill
  - conda-forge::sqlalchemy < 1.4
  - conda-forge::psycopg2-binary
  - conda-forge::pyomo
  - conda-forge::geoalchemy2
  - conda-forge::proj
  - conda-forge::proj-data

